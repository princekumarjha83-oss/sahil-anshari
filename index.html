<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVG Logistics - Dashboard</title>
    <meta name="description" content="CVG Logistics Management System">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="icon" href="/icon-light-32x32.png" type="image/png" media="(prefers-color-scheme: light)">
    <link rel="icon" href="/icon-dark-32x32.png" type="image/png" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="/apple-icon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .loading-container {
            text-align: center;
            padding: 2rem;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #64748b;
            font-size: 1rem;
            margin: 0;
        }
        .error-message {
            color: #ef4444;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading CVG Logistics Dashboard...</p>
        <div id="error-message" class="error-message">
            <p>Failed to load the application. Please refresh the page or contact support.</p>
        </div>
    </div>

    <script>
        // Redirect to the Next.js app
        window.location.href = '/dashboard/';
        
        // Fallback error handling
        setTimeout(() => {
            const errorElement = document.getElementById('error-message');
            const loadingText = document.querySelector('.loading-text');
            const spinner = document.querySelector('.loading-spinner');
            
            if (window.location.pathname === '/' || window.location.pathname === '/index.html') {
                errorElement.style.display = 'block';
                loadingText.textContent = 'Application failed to load';
                spinner.style.display = 'none';
            }
        }, 5000);
    </script>
</body>
</html>
